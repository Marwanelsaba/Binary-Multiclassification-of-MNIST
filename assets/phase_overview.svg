<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">MNIST project phase overview</title>
  <desc id="desc">A comparison between binary classification in phase one and multiclass classification in phase two.</desc>
  <defs>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#082f49"/><stop offset="1" stop-color="#164e63"/></linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2e1065"/><stop offset="1" stop-color="#4c1d95"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1400" height="520" rx="28" fill="#f8fafc"/>
  <text x="700" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="750" fill="#0f172a">Two-Phase Learning Journey</text>
  <text x="700" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#64748b">From a focused binary problem to full ten-class handwritten-digit recognition</text>

  <g transform="translate(70 125)" filter="url(#shadow)">
    <rect width="580" height="330" rx="26" fill="url(#left)"/>
    <rect x="30" y="28" width="92" height="32" rx="16" fill="#22d3ee"/>
    <text x="76" y="50" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#083344">PHASE 1</text>
    <text x="34" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="750" fill="#f8fafc">Binary Classification</text>
    <text x="34" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#bae6fd">Two user-selectable digits — 3 vs 8 by default</text>

    <g transform="translate(34 176)">
      <rect width="102" height="102" rx="20" fill="#071827" stroke="#67e8f9" stroke-width="2"/>
      <rect x="122" width="102" height="102" rx="20" fill="#071827" stroke="#67e8f9" stroke-width="2"/>
      <text x="51" y="73" text-anchor="middle" font-family="Comic Sans MS, Segoe Print, cursive" font-size="67" fill="#f8fafc" transform="rotate(-6 51 51)">3</text>
      <text x="173" y="73" text-anchor="middle" font-family="Comic Sans MS, Segoe Print, cursive" font-size="67" fill="#f8fafc" transform="rotate(5 173 51)">8</text>
      <text x="260" y="25" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="650" fill="#ecfeff">• Logistic Regression</text>
      <text x="260" y="55" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="650" fill="#ecfeff">• K-Nearest Neighbors</text>
      <text x="260" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="650" fill="#ecfeff">• Gaussian Naive Bayes</text>
    </g>
  </g>

  <g transform="translate(750 125)" filter="url(#shadow)">
    <rect width="580" height="330" rx="26" fill="url(#right)"/>
    <rect x="30" y="28" width="92" height="32" rx="16" fill="#c4b5fd"/>
    <text x="76" y="50" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#2e1065">PHASE 2</text>
    <text x="34" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="750" fill="#f8fafc">Multiclass Classification</text>
    <text x="34" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#ddd6fe">All ten handwritten digits — classes 0 through 9</text>

    <g transform="translate(34 176)">
      <g font-family="Comic Sans MS, Segoe Print, cursive" font-size="29" fill="#f8fafc" text-anchor="middle">
        <rect width="224" height="102" rx="20" fill="#170c35" stroke="#c4b5fd" stroke-width="2"/>
        <text x="23" y="40">0</text><text x="67" y="40">1</text><text x="111" y="40">2</text><text x="155" y="40">3</text><text x="199" y="40">4</text>
        <text x="23" y="82">5</text><text x="67" y="82">6</text><text x="111" y="82">7</text><text x="155" y="82">8</text><text x="199" y="82">9</text>
      </g>
      <text x="248" y="25" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#faf5ff">• Regularized Logistic Regression</text>
      <text x="248" y="55" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#faf5ff">• Tuned K-Nearest Neighbors</text>
      <text x="248" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#faf5ff">• Random Forest</text>
    </g>
  </g>
</svg>
